<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Badge Concept Pack</title>
    <style>
      body {
        margin: 0;
        background: #f6eeeb;
        font-family: "Segoe UI", Arial, sans-serif;
        color: #2f2323;
      }
      .page {
        max-width: 1600px;
        margin: 0 auto;
        padding: 24px;
      }
      h1 {
        margin: 0 0 8px;
        font-size: 28px;
      }
      p {
        margin: 0 0 20px;
        color: #6d5a5a;
      }
      .frame {
        background: #fff;
        border: 1px solid #ead8d2;
        border-radius: 24px;
        padding: 16px;
        box-shadow: 0 16px 40px rgba(62, 42, 42, 0.08);
      }
      img {
        display: block;
        width: 100%;
        height: auto;
        border-radius: 18px;
      }
    </style>
  </head>
  <body>
    <div class="page">
      <h1>Badge Concept Pack</h1>
      <p>Style board de duyet nhanh truoc khi tach tung badge thanh asset rieng.</p>
      <div class="frame">
        <img src="badge-style-board.svg" alt="Badge style board" />
      </div>
    </div>
  </body>
</html>
