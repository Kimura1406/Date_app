name: Deploy Render

on:
  workflow_dispatch:
    inputs:
      target:
        description: Deploy target
        required: true
        default: all
        type: choice
        options:
          - all
          - backend
          - admin

jobs:
  verify-backend:
    name: Verify Backend
    if: ${{ inputs.target == 'all' || inputs.target == 'backend' }}
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: backend/go.mod

      - name: Download dependencies
        run: go mod download

      - name: Build API
        run: go build ./cmd/api

  verify-admin:
    name: Verify Admin
    if: ${{ inputs.target == 'all' || inputs.target == 'admin' }}
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: admin

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: admin/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build admin
        run: npm run build

  deploy-backend:
    name: Deploy Backend
    if: ${{ inputs.target == 'all' || inputs.target == 'backend' }}
    needs: verify-backend
    runs-on: ubuntu-latest

    steps:
      - name: Trigger Render backend deploy
        env:
          RENDER_BACKEND_DEPLOY_HOOK_URL: ${{ secrets.RENDER_BACKEND_DEPLOY_HOOK_URL }}
        run: |
          if [ -z "$RENDER_BACKEND_DEPLOY_HOOK_URL" ]; then
            echo "Missing secret: RENDER_BACKEND_DEPLOY_HOOK_URL"
            exit 1
          fi

          curl --fail --silent --show-error \
            --request POST \
            "$RENDER_BACKEND_DEPLOY_HOOK_URL"

  deploy-admin:
    name: Deploy Admin
    if: ${{ inputs.target == 'all' || inputs.target == 'admin' }}
    needs: verify-admin
    runs-on: ubuntu-latest

    steps:
      - name: Trigger Render admin deploy
        env:
          RENDER_ADMIN_DEPLOY_HOOK_URL: ${{ secrets.RENDER_ADMIN_DEPLOY_HOOK_URL }}
        run: |
          if [ -z "$RENDER_ADMIN_DEPLOY_HOOK_URL" ]; then
            echo "Missing secret: RENDER_ADMIN_DEPLOY_HOOK_URL"
            exit 1
          fi

          curl --fail --silent --show-error \
            --request POST \
            "$RENDER_ADMIN_DEPLOY_HOOK_URL"
